<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartinha Linda</title>

    <!-- Google Fonts: Playwrite IE + Indie Flower -->
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+IE&family=Indie+Flower&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/estilo.css">
  </head>

  <body>
    <div class="coracoes">
        <div class="coracao" style="left: 10%; animation-duration: 6s;"></div>
        <div class="coracao" style="left: 25%; animation-duration: 5s;"></div>
         <div class="coracao" style="left: 40%; animation-duration: 7s;"></div>
         <div class="coracao" style="left: 55%; animation-duration: 6.5s;"></div>
         <div class="coracao" style="left: 70%; animation-duration: 5.5s;"></div>
         <div class="coracao" style="left: 85%; animation-duration: 7.5s;"></div>
    </div>
    <div class="carta">
      <h1>Alice</h1>

      <p>
        Já que você gosta de me mandar cartinhas, eu fiz essa para você.
        Essa carta não existe de verdade, por isso, não dá para
        guardar em alguma caixa velha. Guarde esta aqui na sua memória,
        pelo menos aí ela não tem risco de rasgar.
        Te amo, abraços do seu irmão.
      </p>

      <p class="assinatura">Assinado: Dudu</p>
    </div>
  </body>
</html>
